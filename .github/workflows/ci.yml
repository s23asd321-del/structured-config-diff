name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upload readiness helper
        run: python scripts/check_upload_ready.py

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

      - name: CLI entry point smoke check
        run: config-diff diff examples/before/config.json examples/after/config.json --format json --no-values

      - name: CLI JSON smoke check
        run: python -m structured_config_diff.cli diff examples/before/config.json examples/after/config.json

      - name: CLI TOML JSON report smoke check
        run: python -m structured_config_diff.cli diff examples/before/config.toml examples/after/config.toml --format json

      - name: CLI sensitive redaction smoke check
        run: |
          python -m structured_config_diff.cli diff examples/sensitive/before.json examples/sensitive/after.json --format json > /tmp/sensitive-report.json
          python -m json.tool /tmp/sensitive-report.json > /dev/null
          grep -Fq "[REDACTED]" /tmp/sensitive-report.json
          if grep -Fq "FAKE_" /tmp/sensitive-report.json; then
            echo "fake sensitive value was not redacted"
            exit 1
          fi

      - name: CLI fail-on-diff expected exit code
        run: |
          set +e
          python -m structured_config_diff.cli diff examples/before/config.json examples/after/config.json --fail-on-diff
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "expected --fail-on-diff to exit 1, got $status"
            exit 1
          fi
